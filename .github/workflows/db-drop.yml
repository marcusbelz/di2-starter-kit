name: DB - drop

# Drop the WHOLE database + roles of an environment — calls db/scripts/drop.sh.
# DESTRUCTIVE: guarded by a typed confirmation in addition to the manual dispatch.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, int, test, prod]
      confirm:
        description: 'Type "drop" to confirm dropping the whole database'
        required: true

jobs:
  guard:
    name: Confirmation guard
    runs-on: ubuntu-latest
    steps:
      - name: Require typed confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "drop" ]; then
            echo "ERROR: confirmation input must be exactly 'drop' (got '${{ github.event.inputs.confirm }}')."
            exit 1
          fi

  drop:
    name: Drop DB on ${{ github.event.inputs.environment }}
    needs: guard
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: drop.sh via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_ADMIN_PASSWORD_POSTGRES: ${{ secrets.DB_ADMIN_PASSWORD_POSTGRES }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          envs: DB_ADMIN_PASSWORD_POSTGRES
          script: |
            set -e
            if [ -z "${{ vars.DEPLOY_PATH }}" ]; then
              echo "ERROR: environment variable DEPLOY_PATH is not set for '${{ github.event.inputs.environment }}'."
              exit 1
            fi
            cd "${{ vars.DEPLOY_PATH }}"
            git fetch origin "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            bash db/scripts/drop.sh "${{ github.event.inputs.environment }}"
