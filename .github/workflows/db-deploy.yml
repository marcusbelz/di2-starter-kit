name: DB - deploy

# Roll out the schema objects of an environment idempotently (calls
# db/scripts/deploy.sh). Manual dispatch only. Branch -> environment mapping is
# enforced natively via the GitHub Environment deployment-branch rules.

on:
  workflow_dispatch:
    inputs:
      schema:
        description: 'Schema directory under db/schemas/'
        required: true
        default: 'all'
        type: choice
        options: [example, all]
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, int, test, prod]

# Serialize deploys per environment: deploy.sh's run-once check (SELECT ->
# execute -> record) is not concurrency-safe, so two overlapping runs against
# the same database could both pass the check and execute a transition twice.
# cancel-in-progress stays false — a running deploy must finish, the queued one
# then no-ops on everything already applied.
concurrency:
  group: db-deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy ${{ github.event.inputs.schema }} to ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - name: deploy.sh via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DB_FW_PASSWORD: ${{ secrets.DB_FW_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ vars.SSH_PORT || 22 }}
          envs: DB_FW_PASSWORD
          script: |
            set -e
            if [ -z "${{ vars.DEPLOY_PATH }}" ]; then
              echo "ERROR: environment variable DEPLOY_PATH is not set for '${{ github.event.inputs.environment }}'."
              exit 1
            fi
            cd "${{ vars.DEPLOY_PATH }}"
            # --tags so deploy.sh can resolve a release tag of the deployed state.
            git fetch --tags origin "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            bash db/scripts/deploy.sh "${{ github.event.inputs.schema }}" "${{ github.event.inputs.environment }}"
